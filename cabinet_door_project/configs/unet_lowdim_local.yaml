unet_lowdim:
  # Training
  epochs: 50
  batch_size: 64       # MPS loves large batches, this fits easily in 16GB
  learning_rate: 1e-4
  checkpoint_dir: /tmp/cabinet_unet_checkpoints
  val_ratio: 0.05
  val_every: 5
  checkpoint_every: 5
  num_workers: 0         # keep 0, MPS + multiprocessing causes issues
  max_train_steps: null

  # Sequence settings
  horizon: 16
  n_obs_steps: 2
  n_action_steps: 8

  # Diffusion + model settings
  num_train_timesteps: 100
  num_inference_steps: 100
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 512]
  kernel_size: 5
  n_groups: 8